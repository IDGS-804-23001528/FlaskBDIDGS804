{% extends "layout.html" %} 
{% block container %}
<div class="flex justify-center items-center min-h-screen bg-gray-50 py-12 px-4">
    <div class="relative bg-white max-w-sm w-full p-8 rounded-[2rem] shadow-2xl border border-gray-100">
        
        <div class="absolute top-6 left-6">
            <button id="dropdownButton" data-dropdown-toggle="dropdown" class="text-gray-400 hover:text-gray-600 transition-colors">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 12c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                </svg>
            </button>
        </div>

        <div class="flex flex-col items-center">
            <div class="w-32 h-32 mb-4 bg-gray-100 rounded-full flex items-center justify-center overflow-hidden border-4 border-white shadow-sm">
                <img class="w-full h-full object-cover" src="{{url_for('static', filename='img/cuenta.png')}}" alt="User image"/>
            </div>

            <h5 class="text-3xl font-extrabold text-slate-900 text-center tracking-tight mb-1">
                {{nombre}} {{apellidos}}
            </h5>
            <span class="bg-gray-100 text-slate-500 text-xs font-bold px-4 py-1.5 rounded-full uppercase tracking-wider mb-8">
                Alumno Registrado
            </span>

            <div class="w-full space-y-4 mb-8">
                <div class="flex items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="mr-4 text-slate-800">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-none mb-1">Correo Electrónico</p>
                        <p class="text-sm text-slate-700 font-semibold">{{email}}</p>
                    </div>
                </div>

                <div class="flex items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="mr-4 text-slate-800">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-none mb-1">Teléfono</p>
                        <p class="text-sm text-slate-700 font-semibold">{{telefono}}</p>
                    </div>
                </div>
            </div>

            <div class="w-full mb-8 px-2">
                <h3 class="text-sm font-bold text-slate-900 mb-3 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    Cursos Registrados
                </h3>
                <div class="flex flex-wrap gap-2">
                    {% for cur in cursos %}
                        <span class="bg-blue-600 text-white text-[11px] font-bold px-4 py-1.5 rounded-full shadow-sm">
                            {{cur.nombre}}
                        </span>
                    {% else %}
                        <p class="text-xs text-slate-400 italic">Sin cursos inscritos.</p>
                    {% endfor %}
                </div>
            </div>

            <div class="w-full">
                <a href="/alumnos" class="flex justify-center items-center w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-200 font-bold rounded-2xl text-base px-6 py-4 transition-all duration-300 shadow-lg shadow-blue-100">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Regresar al listado
                </a>                
            </div>
        </div>
    </div>
</div>
{% endblock %}
