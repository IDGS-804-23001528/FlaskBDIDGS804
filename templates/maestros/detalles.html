{% extends "layout.html" %}
{% block container %}

<div class="min-h-screen bg-slate-50 flex justify-center items-center py-12 px-4">
    <div class="relative bg-white max-w-sm w-full p-8 pb-12 rounded-[3rem] shadow-2xl border border-slate-100 overflow-visible">
        
        <div class="absolute top-6 right-6">
            <button id="dropdownButton" data-dropdown-toggle="dropdown" class="text-slate-400 hover:text-slate-600 hover:bg-slate-100 p-2 rounded-xl transition-all" type="button">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.75a.75.75 0 110-1.5.75.75 0 010 1.5zM12 12.75a.75.75 0 110-1.5.75.75 0 010 1.5zM12 18.75a.75.75 0 110-1.5.75.75 0 010 1.5z" />
                </svg>
            </button>
            
            <div id="dropdown" class="z-20 hidden w-44 bg-white divide-y divide-slate-100 rounded-2xl shadow-xl border border-slate-100">
                <ul class="py-2 text-sm text-slate-700 font-semibold" aria-labelledby="dropdownButton">
                    <li>
                        <a href="/maestros/modificar/{{id}}" class="block px-4 py-3 hover:bg-slate-50 hover:text-blue-600 transition-colors">Editar Perfil</a>
                    </li>
                    <li>
                        <a href="#" class="block px-4 py-3 hover:bg-slate-50 transition-colors">Exportar Datos</a>
                    </li>
                    <li>
                        <a href="/maestros/eliminar/{{id}}" class="block px-4 py-3 text-red-500 hover:bg-red-50 transition-colors">Eliminar Maestro</a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="flex flex-col items-center">
            <div class="relative mb-6">
                <div class="absolute inset-0 bg-blue-100 rounded-full scale-110 blur-sm opacity-50"></div>
                <img class="relative w-28 h-28 rounded-full border-4 border-white shadow-md object-cover" 
                     src="{{url_for('static', filename='img/cuenta.png')}}" 
                     alt="Maestro imagen"/>
            </div>

            <div class="text-center space-y-2 mb-8">
                <span class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em]">Docente</span>
                <h1 class="text-2xl font-black text-slate-900 leading-tight">
                    {{nombre}} {{apellidos}}
                </h1>
            </div>

            <div class="w-full space-y-4 mb-8">
                <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Correo Institucional</p>
                    <p class="text-sm font-bold text-slate-700 break-all">{{email}}</p>
                </div>
                
                <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Especialidad</p>
                    <p class="text-sm font-bold text-slate-700">{{especialidad}}</p>
                </div>
            </div>

            <div class="w-full">
                <a href="/maestros" class="flex justify-center items-center w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">
                    Regresar al Listado
                </a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
